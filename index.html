<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AlmaConecta</title>

<style>

html{scroll-behavior:smooth;}

body{
margin:0;
font-family:Trebuchet MS,sans-serif;
background:linear-gradient(180deg,#fffcff,#f4efff,#eef9ff);
color:#645b7a;
}

nav{
background:rgba(255,255,255,0.9);
padding:18px;
display:flex;
justify-content:space-between;
position:sticky;
top:0;
backdrop-filter:blur(12px);
z-index:100;
}

nav a{
margin-left:18px;
text-decoration:none;
color:#9b79d6;
font-weight:bold;
}

header{
position:relative;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
text-align:center;
overflow:hidden;
color:white;
}

header video{
position:absolute;
width:100%;
height:100%;
object-fit:cover;
z-index:-2;
}

header::after{
content:"";
position:absolute;
width:100%;
height:100%;
background:rgba(180,150,255,0.28);
z-index:-1;
}

.hero-btn{
background:linear-gradient(135deg,#ffe8ff,#dff7ff);
padding:18px 35px;
border:none;
border-radius:35px;
font-size:18px;
cursor:pointer;
color:#8a67d1;
}

section{
padding:80px 20px;
text-align:center;
}

.grid{
display:flex;
justify-content:center;
gap:30px;
flex-wrap:wrap;
}

.card{
background:white;
width:300px;
padding:25px;
border-radius:35px;
box-shadow:0 8px 25px rgba(176,140,255,0.16);
}

.card img{
width:100%;
height:190px;
object-fit:cover;
border-radius:25px;
}

button{
background:linear-gradient(135deg,#d6b6ff,#a6dcff,#f7cbff);
border:none;
padding:15px;
width:100%;
border-radius:30px;
cursor:pointer;
color:white;
font-weight:bold;
margin-top:10px;
}

button:hover{
transform:scale(1.06);
}

input{
padding:14px;
width:250px;
border-radius:18px;
border:2px solid #eadcff;
margin:10px;
}

.verificado{
color:#4ec9ff;
}

#historial{
background:white;
max-width:850px;
margin:auto;
padding:35px;
border-radius:35px;
}

ul{
list-style:none;
padding:0;
}

li{
padding:12px;
border-bottom:1px solid #eee;
}

.reseñas{
display:none;
margin-top:15px;
padding:15px;
background:#faf7ff;
border-radius:20px;
text-align:left;
}

.controles{
display:flex;
gap:15px;
justify-content:center;
margin-bottom:20px;
}

footer{
background:#b08cff;
color:white;
padding:35px;
text-align:center;
}

</style>
</head>

<body id="inicio">

<nav>
<div>✨ AlmaConecta</div>
<div>
<a href="#guias">Guías</a>
<a href="#reservas">Reservas</a>
</div>
</nav>

<header>

<video autoplay muted loop>
<source src="https://www.w3schools.com/howto/rain.mp4" type="video/mp4">
</video>

<div>
<h1>Fluye hacia tu luz interior</h1>
<a href="#guias">
<button class="hero-btn">Comenzar ✨</button>
</a>
</div>

</header>

<section id="guias">

<h2>Guías verificados</h2>

<input type="text" id="nombreCliente" placeholder="Tu nombre">
<input type="date" id="fechaReserva">

<div class="grid">

<div class="card">
<img src="https://images.unsplash.com/photo-1517841905240-472988babdf9">
<h3>🌿 Luna <span class="verificado">✔</span></h3>
<button onclick="toggleReseñas('r1')">Ver reseñas</button>
<div id="r1" class="reseñas">
<p>⭐ “Muy conectada y empática.”</p>
<p>⭐ “Sesión increíble.”</p>
</div>
<button onclick="reservar('Luna')">Reservar</button>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1494790108377-be9c29b29330">
<h3>🧚 Alma <span class="verificado">✔</span></h3>
<button onclick="toggleReseñas('r2')">Ver reseñas</button>
<div id="r2" class="reseñas">
<p>⭐ “Muy sanadora.”</p>
<p>⭐ “Excelente guía.”</p>
</div>
<button onclick="reservar('Alma')">Reservar</button>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1500648767791-00dcc994a43e">
<h3>🌞 Sol <span class="verificado">✔</span></h3>
<button onclick="toggleReseñas('r3')">Ver reseñas</button>
<div id="r3" class="reseñas">
<p>⭐ “Muchísima claridad.”</p>
<p>⭐ “Recomendado.”</p>
</div>
<button onclick="reservar('Sol')">Reservar</button>
</div>

</div>

</section>

<section id="reservas">

<div id="historial">

<h2>Reservas agendadas</h2>

<div class="controles">
<button onclick="toggleHistorial()">Ocultar / Mostrar</button>
<button onclick="reiniciarReservas()">Reiniciar</button>
</div>

<ul id="listaReservas"></ul>

</div>

</section>

<footer>
✨ AlmaConecta © 2026
</footer>

<script>

let reservas=JSON.parse(localStorage.getItem("reservas"))||[];

mostrarReservas();

function reservar(sanador){

let nombre=document.getElementById("nombreCliente").value;
let fecha=document.getElementById("fechaReserva").value;

if(nombre===""||fecha===""){
alert("Completa nombre y fecha");
return;
}

reservas.push(nombre+" reservó con "+sanador+" para "+fecha+" ✨");

localStorage.setItem("reservas",JSON.stringify(reservas));

mostrarReservas();

window.location.href="#reservas";
}

function mostrarReservas(){

let lista=document.getElementById("listaReservas");
lista.innerHTML="";

reservas.forEach(function(r){
let item=document.createElement("li");
item.innerHTML=r;
lista.appendChild(item);
});
}

function reiniciarReservas(){
reservas=[];
localStorage.setItem("reservas",JSON.stringify(reservas));
mostrarReservas();
}

function toggleHistorial(){
let lista=document.getElementById("listaReservas");

if(lista.style.display==="none"){
lista.style.display="block";
}else{
lista.style.display="none";
}
}

function toggleReseñas(id){
let caja=document.getElementById(id);

if(caja.style.display==="block"){
caja.style.display="none";
}else{
caja.style.display="block";
}
}

</script>

</body>
</html>
