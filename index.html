<!DOCTYPE html>
<html>
<head>
    <title>Espacio de Sanación</title>

    <style>
        body {
            font-family: Arial;
            background: #f8f4ff;
            text-align: center;
            padding: 30px;
        }

        h1 {
            color: #6a0dad;
        }

        input {
            padding: 12px;
            width: 250px;
            margin-bottom: 20px;
            border-radius: 8px;
        }

        .contenedor {
            display: flex;
            justify-content: center;
            gap: 20px;
            flex-wrap: wrap;
        }

        .tarjeta {
            background: white;
            width: 250px;
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0px 4px 10px rgba(0,0,0,0.1);
        }

        button {
            background-color: #b57edc;
            color: white;
            border: none;
            padding: 12px;
            border-radius: 8px;
            width: 100%;
            cursor: pointer;
        }

        #historial {
            margin-top: 40px;
            background: white;
            padding: 20px;
            border-radius: 15px;
            max-width: 700px;
            margin-left: auto;
            margin-right: auto;
        }

        li {
            text-align: left;
            margin: 10px 0;
        }
    </style>
</head>

<body>

    <h1>✨ Espacio de Sanación ✨</h1>

    <input type="text" id="nombreCliente" placeholder="Tu nombre">

    <div class="contenedor">

        <div class="tarjeta">
            <h3>🌿 Luna</h3>
<p>Equilibrio energético</p>
<p>⭐ 4.9 (128 sesiones)</p>
            <button onclick="reservar('Luna')">Reservar</button>
        </div>

        <div class="tarjeta">
            <h3>💖 Alma</h3>
<p>Sanación emocional</p>
<p>⭐ 4.8 (97 sesiones)</p>
            <button onclick="reservar('Alma')">Reservar</button>
        </div>

        <div class="tarjeta">
            <h3>🌟 Sol</h3>
<p>Propósito de vida</p>
<p>⭐ 5.0 (143 sesiones)</p>
            <button onclick="reservar('Sol')">Reservar</button>
        </div>

    </div>

    <div id="historial">
        <h2>📋 Reservas registradas</h2>
        <ul id="listaReservas"></ul>
    </div>

   <script>

let reservas = JSON.parse(localStorage.getItem("reservas")) || [];

mostrarReservas();

function reservar(sanador) {
    let nombre = document.getElementById("nombreCliente").value;

    if(nombre === "") {
        alert("Escribe tu nombre");
        return;
    }

    reservas.push(nombre + " reservó con " + sanador + " 💫");

    localStorage.setItem("reservas", JSON.stringify(reservas));

    mostrarReservas();
}

function mostrarReservas() {
    let lista = document.getElementById("listaReservas");
    lista.innerHTML = "";

    reservas.forEach(function(reserva) {
        let item = document.createElement("li");
        item.innerHTML = reserva;
        lista.appendChild(item);
    });
}

</script>

</body>
</html>
