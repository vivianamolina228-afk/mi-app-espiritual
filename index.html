<!DOCTYPE html>
<html>
<head>
    <title>Espacio de Sanación</title>

    <style>
        body {
            font-family: Arial;
            background: #f8f4ff;
            text-align: center;
            padding: 30px;
        }

        h1 {
            color: #6a0dad;
        }

        .contenedor {
            display: flex;
            justify-content: center;
            gap: 20px;
            flex-wrap: wrap;
        }

        .tarjeta {
            background: white;
            width: 250px;
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0px 4px 10px rgba(0,0,0,0.1);
        }

        button {
            background-color: #b57edc;
            color: white;
            border: none;
            padding: 12px;
            border-radius: 8px;
            cursor: pointer;
            width: 100%;
        }

        button:hover {
            background-color: #9b5fc0;
        }

        #resultado {
            margin-top: 30px;
            font-size: 18px;
        }
    </style>
</head>

<body>

    <h1>✨ Espacio de Sanación ✨</h1>
    <p>Encuentra tu guía espiritual ideal</p>

    <div class="contenedor">

        <div class="tarjeta">
            <h3>🌿 Luna</h3>
            <p>Especialista en equilibrio energético</p>
            <button onclick="reservar('Luna')">Reservar</button>
        </div>

        <div class="tarjeta">
            <h3>💖 Alma</h3>
            <p>Sanación emocional y relaciones</p>
            <button onclick="reservar('Alma')">Reservar</button>
        </div>

        <div class="tarjeta">
            <h3>🌟 Sol</h3>
            <p>Propósito de vida y claridad interior</p>
            <button onclick="reservar('Sol')">Reservar</button>
        </div>

    </div>

    <div id="resultado"></div>

    <script>
        function reservar(nombre) {
            document.getElementById("resultado").innerHTML =
                "✅ Reserva confirmada con <b>" + nombre + "</b> 💫";
        }
    </script>

</body>
</html>
