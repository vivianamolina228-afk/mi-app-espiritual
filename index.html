<!DOCTYPE html>
<html>
<head>
    <title>Espacio de Sanación</title>

    <style>
        body {
            font-family: Arial;
            background: #f8f4ff;
            text-align: center;
            padding: 30px;
        }

        h1 {
            color: #6a0dad;
        }

        input {
            padding: 12px;
            width: 250px;
            margin-bottom: 20px;
            border-radius: 8px;
            border: 1px solid #ccc;
        }

        .contenedor {
            display: flex;
            justify-content: center;
            gap: 20px;
            flex-wrap: wrap;
        }

        .tarjeta {
            background: white;
            width: 250px;
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0px 4px 10px rgba(0,0,0,0.1);
        }

        button {
            background-color: #b57edc;
            color: white;
            border: none;
            padding: 12px;
            border-radius: 8px;
            cursor: pointer;
            width: 100%;
        }

        #resultado {
            margin-top: 30px;
            font-size: 18px;
        }
    </style>
</head>

<body>

    <h1>✨ Espacio de Sanación ✨</h1>
    <p>Escribe tu nombre y reserva</p>

    <input type="text" id="nombreCliente" placeholder="Tu nombre">

    <div class="contenedor">

        <div class="tarjeta">
            <h3>🌿 Luna</h3>
            <p>Equilibrio energético</p>
            <button onclick="reservar('Luna')">Reservar</button>
        </div>

        <div class="tarjeta">
            <h3>💖 Alma</h3>
            <p>Sanación emocional</p>
            <button onclick="reservar('Alma')">Reservar</button>
        </div>

        <div class="tarjeta">
            <h3>🌟 Sol</h3>
            <p>Propósito de vida</p>
            <button onclick="reservar('Sol')">Reservar</button>
        </div>

    </div>

    <div id="resultado"></div>

    <script>
        function reservar(sanador) {
            let nombre = document.getElementById("nombreCliente").value;

            if(nombre === "") {
                alert("Escribe tu nombre primero");
                return;
            }

            document.getElementById("resultado").innerHTML =
                "✅ " + nombre + ", tu reserva con <b>" + sanador + "</b> fue confirmada 💫";
        }
    </script>

</body>
</html>
